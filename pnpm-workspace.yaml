packages:
  - "apps/*"
  - "packages/*"
  # apps/mobile is a standalone Expo (React Native) project on React 18 / RN — it installs
  # on its own (see apps/mobile/README.md). Excluded so its dependency graph never conflicts
  # with the web app's React 19 or the monorepo gates.
  - "!apps/mobile"

allowBuilds:
  '@prisma/client': set this to true or false
  '@prisma/engines': set this to true or false
  esbuild: set this to true or false
  prisma: set this to true or false
  sharp: set this to true or false

onlyBuiltDependencies:
  - "@prisma/client"
  - "@prisma/engines"
  - prisma
  - esbuild
  - sharp
